<title>ZONE 10</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --brand:#6D9228; --brand-d:#4d6b1c; --lime:#A4C639; --gold:#C8A24B;
    --bg:#eef1e8; --card:#ffffff; --card2:#f3f6ee; --line:#e3e8da;
    --ink:#1d2a18; --txt:#1d2a18; --muted:#69755e;
    --good:#5e9e2b; --brand2:#A4C639; --warn:#d99500; --bad:#d64545; --accent:#5A7A22;
    --r:16px; --sh:0 1px 2px rgba(20,40,15,.06),0 8px 24px rgba(20,40,15,.06);
  }
  *{box-sizing:border-box}
  html,body{max-width:100%;width:100%;overflow-x:clip}
  body{margin:0;font-size:16px;line-height:1.5;font-family:"Segoe UI",Tahoma,"Helvetica Neue",Arial,sans-serif;color:var(--ink);-webkit-text-size-adjust:100%;min-height:100vh;-webkit-font-smoothing:antialiased;
    background:
      radial-gradient(1100px 460px at 88% -8%, rgba(123,164,40,.20), transparent 60%),
      radial-gradient(900px 420px at -6% 12%, rgba(168,198,57,.16), transparent 58%),
      radial-gradient(800px 600px at 50% 120%, rgba(92,126,28,.14), transparent 60%),
      linear-gradient(160deg,#eaf1dc 0%,#f6f9ef 34%,#ffffff 56%,#eef4e0 100%);
    background-attachment:fixed}
  canvas,img{max-width:100%}

  header{position:sticky;top:0;z-index:20;background:linear-gradient(120deg,#2e4d16 0%,#5C7E1C 55%,#6D9228 100%);color:#fff;padding:16px 18px;box-shadow:0 6px 22px rgba(46,77,22,.28)}
  header .top{display:flex;justify-content:space-between;align-items:center;gap:10px}
  header h1{margin:0;font-size:19px;font-weight:800;letter-spacing:.2px;display:flex;align-items:center;gap:10px}
  header h1 img{width:42px;height:42px;object-fit:contain;border-radius:11px;background:#fff;padding:5px;box-shadow:0 3px 8px rgba(0,0,0,.18)}
  header .sub{font-size:12.5px;opacity:.92;margin-top:3px;font-weight:500}
  .syncdot{font-size:11.5px;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.14);padding:6px 11px;border-radius:999px;white-space:nowrap}
  .dot{width:9px;height:9px;border-radius:50%;background:#cbd5c0}
  .dot.on{background:#9be15d} .dot.off{background:#ff7676} .dot.sync{background:#ffd24a}
  header .muted,#whoami{color:rgba(255,255,255,.9)!important;font-weight:600}
  #whoami a{color:#fff;text-decoration:underline;font-weight:700}

  nav{display:flex;flex-wrap:wrap;gap:6px;padding:9px 12px;background:#fff;position:sticky;top:62px;z-index:19;border-bottom:1px solid var(--line);box-shadow:0 4px 14px rgba(20,40,15,.05)}
  nav::-webkit-scrollbar{display:none}
  nav button{flex:0 0 auto;background:transparent;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:8px 16px;font-size:14.5px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.15s}
  nav button:hover{border-color:var(--brand);color:var(--brand)}
  nav button.active{background:linear-gradient(120deg,#5C7E1C,#7BA428);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(92,126,28,.32)}

  main{padding:16px;max-width:1040px;width:100%;margin:0 auto;padding-bottom:70px;overflow-x:clip}
  .grid{display:grid;gap:14px}
  .grid.cards{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}

  .card{position:relative;background:linear-gradient(168deg,#eaf8ef 0%,#dcf2e4 60%,#cdecd8 100%);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--sh);overflow:hidden}
  .card::before{content:"";position:absolute;inset:0 0 auto 0;height:3px;background:linear-gradient(90deg,#7BA428,#A4C639,#C8A24B)}
  .mini td.name,.mini th.name{white-space:normal!important;word-break:break-word}
  .mini{table-layout:fixed}
  .card h2{margin:0 0 4px;font-size:19px;font-weight:800}
  .card h3{margin:0 0 10px;font-size:16px;font-weight:700;color:var(--ink)}
  .row{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .muted{color:var(--muted);font-size:13px}
  .big{font-size:30px;font-weight:800;line-height:1.1;color:var(--ink)}

  .bar{height:11px;background:#e7ecdf;border-radius:999px;overflow:hidden;margin-top:10px}
  .bar > i{display:block;height:100%;border-radius:999px;transition:width .5s}
  .pill{display:inline-block;font-size:11px;padding:3px 11px;border-radius:999px;font-weight:700;letter-spacing:.2px}

  table{width:100%;border-collapse:collapse;font-size:14.5px}
  th,td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:center}
  thead th,tr:first-child th{position:relative}
  th{color:var(--muted);font-weight:700;font-size:12.5px;text-transform:none}
  td.name,th.name{text-align:right;white-space:nowrap;font-weight:600}
  tbody tr:hover,tr:hover{background:var(--card2)}

  input,select{background:#fff;border:1.5px solid var(--line);color:var(--ink);border-radius:12px;padding:12px 13px;font-size:16px;width:100%;font-family:inherit;transition:.15s}
  input:focus,select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(123,164,40,.15)}
  button.btn{background:linear-gradient(120deg,#5C7E1C,#7BA428);color:#fff;border:none;border-radius:12px;padding:12px 18px;font-size:15.5px;cursor:pointer;font-weight:700;box-shadow:0 4px 13px rgba(92,126,28,.30);transition:.15s}
  button.btn:hover{filter:brightness(1.05)}
  button.btn:active{transform:translateY(1px)}
  button.btn.ghost{background:#fff;border:1.5px solid var(--line);color:var(--ink);box-shadow:none}
  button.btn.ghost:hover{border-color:var(--brand);color:var(--brand)}
  button.btn.danger{background:linear-gradient(120deg,#c23b3b,#d64545);box-shadow:0 4px 13px rgba(214,69,69,.28)}
  button.btn.sm{padding:7px 12px;font-size:12.5px}
  button.btn.block{width:100%;margin-top:8px;padding:14px}

  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .rank{width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:12.5px;background:var(--card2);color:var(--muted)}
  .rank.g1{background:linear-gradient(135deg,#fde68a,#f5c542);color:#7a5200}.rank.g2{background:linear-gradient(135deg,#eef1f4,#cdd6e0);color:#3a4654}.rank.g3{background:linear-gradient(135deg,#fdc98a,#f0a35a);color:#7c3d12}
  .clickable{cursor:pointer;transition:.15s}.clickable:hover{color:var(--brand)}

  .chartbox{position:relative;height:250px;width:100%;max-width:100%;overflow:hidden}
  .chartbox canvas{width:100%!important}
  .scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px}

  dialog{background:var(--card);color:var(--ink);border:none;border-radius:18px;width:min(460px,94vw);padding:20px;box-shadow:0 20px 60px rgba(20,40,15,.35)}
  dialog::backdrop{background:rgba(20,40,15,.45);backdrop-filter:blur(2px)}
  .field{margin-bottom:12px}.field label{font-size:13px;color:var(--muted);display:block;margin-bottom:5px;font-weight:600}
  .hint{font-size:12.5px;color:var(--muted);margin-top:5px}
  .editgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .footnote{text-align:center;color:var(--muted);font-size:12.5px;margin-top:22px}

  .center{max-width:440px;margin:34px auto}
  .choice{display:flex;gap:12px;flex-wrap:wrap}
  .choice .card{flex:1;text-align:center;cursor:pointer;min-width:140px;transition:.15s}
  .choice .card:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(20,40,15,.14);border-color:var(--brand)}
  .choice .card .ic{font-size:36px}
  .pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:12px}
  .pinpad button{padding:17px;font-size:19px;background:var(--card2);border:1px solid var(--line);color:var(--ink);border-radius:12px;cursor:pointer;font-weight:700;transition:.12s}
  .pinpad button:hover{background:#e8efdc}
  .pindisp{font-size:27px;letter-spacing:9px;text-align:center;padding:12px;background:var(--card2);border-radius:12px;min-height:50px;font-weight:800}

  @media(max-width:600px){
    header{padding:13px 14px}
    header h1{font-size:16.5px}
    header h1 img{width:36px;height:36px}
    nav{top:58px;padding:8px 10px}
    nav button{padding:7px 13px;font-size:13.5px}
    main{padding:11px;padding-bottom:76px}
    .grid{grid-template-columns:1fr 1fr !important}
    .grid.cards{grid-template-columns:1fr 1fr !important}
    .editgrid{grid-template-columns:1fr !important}
    .big{font-size:24px}
    .card{padding:14px}
    .card h2{font-size:17px}
    table{font-size:13.5px}
    th,td{padding:8px 5px}
    .choice .card{min-width:0}
  }
</style>
</head>
<body>

<script>
/* ================= الإعدادات السحابية ================= */
/* نفس مشروع Supabase بتاع الفيوم، نفس الجدول branch_state لكن بصف منفصل region-10
   علشان ما نحتاجش ننشئ جدول جديد. لو عايز مشروع مختلف غيّر القيمتين دول فقط. */
const CLOUD = {

  key: 'sb_publishable_PCPpRh5gz_DgC8H8ZqT8AA_l1M8Fewy',
  rowId: 'region-10',
  table: 'branch_state'

/* ================= نموذج البيانات ================= */
const PRODUCTS=[
  {key:'liabilities_cs',label:'حسابات جارية وتوفير',weight:15,unit:'ج.م'},
  {key:'liabilities_cert',label:'شهادات وودائع',weight:30,unit:'ج.م'},
  {key:'assets',label:'القروض',weight:20,unit:'ج.م'},
  {key:'cards',label:'الكروت',weight:20,unit:'عدد'},
  {key:'internet_bank',label:'إنترنت بنكي',weight:5,unit:'عدد'},
  {key:'bank_insurance',label:'تأمين بنكي',weight:5,unit:'ج.م'},
  {key:'ntb',label:'عملاء جدد (NTB)',weight:5,unit:'عدد'},
];
const TOTAL_WEIGHT=PRODUCTS.reduce((s,p)=>s+p.weight,0);
/* منتجات تُحتسب فور إدخالها يوميًا. assets و cards تأتي من الـ pipeline (مكتمل فقط) */
const DIRECT_KEYS=['liabilities_cs','liabilities_cert','internet_bank','bank_insurance','ntb'];
const GRACE_DAYS=2; // مهلة يومي عمل لتغيير الحالة
const STORE_KEY='region10_state_v3', SESS_KEY='region10_session', DEV_KEY='region10_device';
const DEFAULT_BRANCHES=['فرع الفيوم','فرع بني سويف','فرع المنيا','فرع أسيوط','فرع ملوي','فرع سمالوط'];

function uid(p){return p+'-'+Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function blank(v=0){const o={};PRODUCTS.forEach(p=>o[p.key]=v);return o}
function deviceId(){let d=localStorage.getItem(DEV_KEY);if(!d){d='dev-'+uid('');localStorage.setItem(DEV_KEY,d)}return d}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function curMonth(){return todayStr().slice(0,7)}
/* أيام العمل: الجمعة(5) والسبت(6) عطلة */
function isWeekend(d){const w=d.getDay();return w===5||w===6;}
function addBusinessDays(dateStr,n){const d=new Date(dateStr+'T00:00:00');let a=0;while(a<n){d.setDate(d.getDate()+1);if(!isWeekend(d))a++;}
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function businessDaysLeft(deadline,today){let d=new Date(today+'T00:00:00'),end=new Date(deadline+'T00:00:00'),c=0;
  while(d<end){d.setDate(d.getDate()+1);if(!isWeekend(d))c++;}return c;}
function deadlineFrom(dateStr){return addBusinessDays(dateStr,GRACE_DAYS);}

function seedEmployee(i){return {id:uid('emp'),name:'موظف '+i,active:true,pin:'',
  targets:{liabilities_cs:500000,liabilities_cert:1000000,assets:400000,cards:4,internet_bank:4,bank_insurance:8000,ntb:3}};}
function seedBranch(name){const e=[];for(let i=1;i<=10;i++)e.push(seedEmployee(i));return {id:uid('br'),name,managerPin:'',employees:e};}
function seedState(){return {region:{name:'المنطقة العاشرة'},adminPin:'1234',
  branches:DEFAULT_BRANCHES.map(seedBranch),entries:[],pipeline:[],messages:[],referrals:[],
  deletedEntryIds:[],deletedPipeIds:[],deletedMsgIds:[],
  configRev:1,configUpdatedAt:new Date().toISOString()};}

let state=loadLocal();
let session=JSON.parse(localStorage.getItem(SESS_KEY)||'null');
let period={mode:'cumulative'};

function loadLocal(){try{const s=JSON.parse(localStorage.getItem(STORE_KEY));if(s&&s.branches)return normalize(s);}catch(e){}return seedState();}
function normalize(s){s.entries=s.entries||[];s.pipeline=s.pipeline||[];s.messages=s.messages||[];s.referrals=s.referrals||[];s.deletedEntryIds=s.deletedEntryIds||[];s.deletedPipeIds=s.deletedPipeIds||[];s.deletedMsgIds=s.deletedMsgIds||[];s.configRev=s.configRev||1;
  s.adminPin=s.adminPin||'1234';s.region=s.region||{name:'المنطقة العاشرة'};
  s.branches.forEach(b=>{if(b.managerPin===undefined)b.managerPin='';b.employees.forEach(e=>{e.pin=e.pin||'';e.active=e.active!==false;});});return s;}
function saveLocal(){localStorage.setItem(STORE_KEY,JSON.stringify(state));}
function bumpConfig(){state.configRev=(state.configRev||1)+1;state.configUpdatedAt=new Date().toISOString();}
function commit(isConfig){if(isConfig)bumpConfig();saveLocal();schedulePush();render();}

/* ================= الحسابات ================= */
function entriesFor(empId){
  const del=new Set(state.deletedEntryIds);
  return state.entries.filter(en=>en.empId===empId&&!del.has(en.id)&&inPeriod(en.date));
}
function periodRange(){
  const now=new Date();const y=now.getFullYear();
  if(period.mode==='custom')return {start:period.start,end:period.end};
  if(period.mode==='today'){const s=new Date(now);s.setHours(0,0,0,0);const e=new Date(now);e.setHours(23,59,59,999);return {start:s,end:e};}
  if(period.mode==='week'){const d=new Date(now);const diff=(d.getDay()+1)%7;
    const start=new Date(d);start.setDate(d.getDate()-diff);start.setHours(0,0,0,0);
    const end=new Date(start);end.setDate(start.getDate()+6);end.setHours(23,59,59,999);return {start,end};}
  if(period.mode==='month')return {start:new Date(y,now.getMonth(),1),end:new Date(y,now.getMonth()+1,0,23,59,59,999)};
  if(period.mode==='quarter'){const q=Math.floor(now.getMonth()/3);return {start:new Date(y,q*3,1),end:new Date(y,q*3+3,0,23,59,59,999)};}
  if(period.mode==='year')return {start:new Date(y,0,1),end:new Date(y,11,31,23,59,59,999)};
  return null;
}
function inPeriod(date){
  const r=periodRange();if(!r)return true;
  const d=new Date((date||'')+'T00:00:00');if(isNaN(d.getTime()))return false;
  return d>=r.start&&d<=r.end;
}
/* عناصر القروض/الكروت لموظف (غير المحذوفة) */
function pipeFor(empId){const del=new Set(state.deletedPipeIds);return state.pipeline.filter(p=>p.empId===empId&&!del.has(p.id));}
function actualsOf(empId){
  const a=blank(0);
  // المنتجات المباشرة من الإدخال اليومي
  entriesFor(empId).forEach(en=>{DIRECT_KEYS.forEach(k=>a[k]+=Number((en.values&&en.values[k])||0));});
  // القروض المصروفة والكروت المُصدَرة فقط (مكتمل) ضمن الفترة
  pipeFor(empId).filter(p=>p.stage==='completed'&&inPeriod(p.completedDate||p.signedDate)).forEach(p=>{
    if(p.product==='loan')a.assets+=Number(p.value||0);else a.cards+=1;
  });
  return a;
}
/* مجاميع الأنشطة (زيارات/مكالمات) للموظف ضمن الفترة */
function activityOf(empId){let visits=0,calls=0;entriesFor(empId).forEach(en=>{visits+=Number(en.visits||0);calls+=Number(en.calls||0);});return {visits,calls};}
function activityBranch(b){let visits=0,calls=0;b.employees.forEach(e=>{if(e.active===false)return;const x=activityOf(e.id);visits+=x.visits;calls+=x.calls;});return {visits,calls};}
function pctOf(a,t){if(!t||t<=0)return 0;return Math.min((a/t)*100,150);}
function weightedScore(t,a){let w=0,acc=0;PRODUCTS.forEach(p=>{if(t[p.key]>0){w+=p.weight;acc+=p.weight*Math.min(a[p.key]/t[p.key],1.5);}});return w?(acc/w)*100:0;}
function tgtFactor(){const m=period.mode;return m==='today'?1/250:m==='week'?1/52:m==='month'?1/12:m==='quarter'?1/4:1;}
function tgtOf(e,key){return Number((e.targets||{})[key]||0)*tgtFactor();}
function scaledTargets(e){const o={};PRODUCTS.forEach(p=>o[p.key]=tgtOf(e,p.key));return o;}
function empScore(e){return weightedScore(scaledTargets(e),actualsOf(e.id));}
function aggBranch(b){const t=blank(0),a=blank(0);let c=0;
  b.employees.forEach(e=>{if(e.active===false)return;c++;const ea=actualsOf(e.id);PRODUCTS.forEach(p=>{t[p.key]+=tgtOf(e,p.key);a[p.key]+=ea[p.key];});});
  return {t,a,score:weightedScore(t,a),count:c};}
function aggRegion(){const t=blank(0),a=blank(0);let emps=0;
  state.branches.forEach(b=>{const g=aggBranch(b);emps+=g.count;PRODUCTS.forEach(p=>{t[p.key]+=g.t[p.key];a[p.key]+=g.a[p.key];});});
  return {t,a,score:weightedScore(t,a),branches:state.branches.length,emps};}

/* ================= عرض مساعد ================= */
function scoreColor(s){return s>=100?'#3f8f1f':s>=70?'#6d9228':s>=50?'var(--warn)':'var(--bad)';}
function scoreLabel(s){return s>=100?'متفوّق':s>=70?'جيد':s>=50?'مقبول':'متعثّر';}
function fmt(n){return Number(n||0).toLocaleString('en-US');}
function pillFor(s){return `<span class="pill" style="background:${scoreColor(s)}22;color:${scoreColor(s)}">${scoreLabel(s)} · ${s.toFixed(0)}%</span>`;}
function barFor(s){return `<div class="bar"><i style="width:${Math.min(s,100)}%;background:${scoreColor(s)}"></i></div>`;}
function esc(t){return String(t).replace(/"/g,'&quot;').replace(/</g,'&lt;')}

let route={page:'region',branchId:null},chartRefs=[];
function destroyCharts(){chartRefs.forEach(c=>{try{c.destroy()}catch(e){}});chartRefs=[];}
function go(page,branchId){route={page,branchId:branchId||null};render();}

}

function startAdminLogin(){
  pinPrompt('دخول الإدارة','أدخل رقم الإدارة السري',(pin)=>{
    if(pin===String(state.adminPin)){session={role:'admin'};saveSession();go('dashboard');return true;}
    return false;
  });
}
function startEmployeeLogin(){
  let opts=state.branches.map(b=>`<option value="${b.id}">${esc(b.name)}</option>`).join('');
  openDlg('دخول موظف',`<div class="field"><label>الفرع</label><select id="lb">${opts}</select></div>
    <div class="field"><label>الاسم</label><select id="le"></select></div>`,()=>{
      const bid=document.getElementById('lb').value,eid=document.getElementById('le').value;
      const b=state.branches.find(x=>x.id===bid),e=b.employees.find(x=>x.id===eid);
      setTimeout(()=>employeePinStep(bid,eid,e),60);return true;
    },'متابعة');
  const fill=()=>{const b=state.branches.find(x=>x.id===document.getElementById('lb').value);
    document.getElementById('le').innerHTML=b.employees.filter(e=>e.active!==false).map(e=>`<option value="${e.id}">${esc(e.name)}</option>`).join('');};
  document.getElementById('lb').onchange=fill;fill();
}
function employeePinStep(bid,eid,e){
  if(!e.pin){
    pinPrompt('تعيين رقم سري','أنت تدخل لأول مرة — اختر رقمًا سريًا (4 أرقام) لحسابك',(pin)=>{
      if(pin.length<4)return false;e.pin=pin;commit(true);
      session={role:'employee',branchId:bid,empId:eid};saveSession();go('myday');return true;});
  }else{
    pinPrompt('دخول '+e.name,'أدخل رقمك السري',(pin)=>{
      if(pin===e.pin){session={role:'employee',branchId:bid,empId:eid};saveSession();go('myday');return true;}
      return false;});
  }
}
function startManagerLogin(){
  let opts=state.branches.map(b=>`<option value="${b.id}">${esc(b.name)}</option>`).join('');
  openDlg('دخول مدير فرع',`<div class="field"><label>الفرع</label><select id="lb">${opts}</select></div>`,()=>{
    const bid=document.getElementById('lb').value;const b=state.branches.find(x=>x.id===bid);
    setTimeout(()=>managerPinStep(b),60);return true;
  },'متابعة');
}
function managerPinStep(b){
  if(!b.managerPin){
    pinPrompt('تعيين رقم سري','أول دخول لمدير '+b.name+' — اختر رقمًا سريًا (4 أرقام)',(pin)=>{
      if(pin.length<4)return false;b.managerPin=pin;commit(true);
      session={role:'manager',branchId:b.id};saveSession();go('branch',b.id);return true;});
  }else{
    pinPrompt('دخول مدير '+b.name,'أدخل الرقم السري للمدير',(pin)=>{
      if(pin===b.managerPin){session={role:'manager',branchId:b.id};saveSession();go('branch',b.id);return true;}
      return false;});
  }
}
function pinPrompt(title,sub,check){
  let pin='';
  const body=`<div class="muted" style="margin-bottom:8px">${sub}</div>
    <div class="pindisp" id="pd"></div><div id="pinerr" class="hint" style="color:var(--bad);min-height:14px"></div>
    <div class="pinpad">${[1,2,3,4,5,6,7,8,9].map(n=>`<button type="button" onclick="pinKey('${n}')">${n}</button>`).join('')}
      <button type="button" onclick="pinKey('del')">⌫</button>
      <button type="button" onclick="pinKey('0')">0</button>
      <button type="button" onclick="pinKey('ok')">✓</button></div>`;
  openDlg(title,body,()=>false);
  document.getElementById('dlgOk').style.display='none';
  window.pinKey=(k)=>{
    if(k==='del')pin=pin.slice(0,-1);
    else if(k==='ok'){if(check(pin)){dlg.close();}else{document.getElementById('pinerr').textContent='رقم غير صحيح';pin='';}}
    else if(pin.length<8)pin+=k;
    document.getElementById('pd').textContent='•'.repeat(pin.length);
  };
}

function renameBranch(id){const b=state.branches.find(x=>x.id===id);
  openDlg('إعادة تسمية',`<div class="field"><label>الاسم</label><input id="fn" value="${esc(b.name)}"></div>`,()=>{const n=document.getElementById('fn').value.trim();if(!n)return false;b.name=n;commit(true);});}

function changeManagerPin(){const b=state.branches.find(x=>x.id===session.branchId);if(!b)return;openDlg('تغيير رقم المدير',`<div class="field"><label>رقم جديد (4-8 أرقام)</label><input id="fp" type="number"></div>`,()=>{const p=document.getElementById('fp').value.trim();if(p.length<4)return false;b.managerPin=p;commit(true);});}
function addEmployee(brId){const b=state.branches.find(x=>x.id===brId);
  openDlg('إضافة موظف',`<div class="field"><label>الاسم</label><input id="fn" placeholder="اسم الموظف"></div><div class="hint">مستهدفات افتراضية يمكن تعديلها لاحقًا.</div>`,()=>{
    const n=document.getElementById('fn').value.trim();if(!n)return false;const e=seedEmployee(b.employees.length+1);e.name=n;b.employees.push(e);commit(true);});}
function editEmployee(brId,empId){const b=state.branches.find(x=>x.id===brId),e=b.employees.find(x=>x.id===empId);
  let f=`<div class="field"><label>اسم الموظف</label><input id="fn" value="${esc(e.name)}"></div>
    <div class="field"><label>الرقم السري (فارغ = إعادة تعيين عند الدخول)</label><input id="fpin" value="${esc(e.pin||'')}"></div>
    <div class="hint">المستهدفات:</div><div class="editgrid" style="margin-top:6px">`;
  PRODUCTS.forEach(p=>f+=`<div class="field"><label>${p.label} (${p.unit})</label><input type="number" id="t_${p.key}" value="${e.targets[p.key]||0}"></div>`);
  openDlg('تعديل موظف',f+`</div>`,()=>{e.name=document.getElementById('fn').value.trim()||e.name;

function delEmployee(brId,empId){if(!confirm('حذف الموظف؟'))return;const b=state.branches.find(x=>x.id===brId);b.employees=b.employees.filter(e=>e.id!==empId);commit(true);}

function newPipe(product,value){const d=todayStr();return {id:uid('pi'),empId:session.empId,branchId:session.branchId,
  product,value:value||0,stage:'signed',signedDate:d,stageDate:d,deadlineDate:deadlineFrom(d),
  updatedAt:new Date().toISOString(),deviceId:deviceId()};}

function addCards(){let n=Number(document.getElementById('cardCnt').value||0);if(n<=0)return alert('أدخل عدد الكروت');
  for(let i=0;i<n;i++)state.pipeline.push(newPipe('card',0));commit(false);alert('أُضيف '+n+' كارت موقّع');}
function advancePipe(id){const p=state.pipeline.find(x=>x.id===id);if(!p)return;const d=todayStr();
  if(p.stage==='signed'){p.stage='uploaded';p.stageDate=d;p.deadlineDate=deadlineFrom(d);}
  else if(p.stage==='uploaded'){p.stage='completed';p.completedDate=d;}
  p.updatedAt=new Date().toISOString();p.deviceId=deviceId();commit(false);}
function cancelPipe(id){if(!confirm('إلغاء/رفض هذا العنصر؟'))return;const p=state.pipeline.find(x=>x.id===id);if(!p)return;
  p.stage='cancelled';p.updatedAt=new Date().toISOString();p.deviceId=deviceId();commit(false);}

function viewerKey(){return session.role==='admin'?'admin':session.role==='manager'?'mgr-'+session.branchId:session.empId;}
function msgVisible(m){
  if(session.role==='admin')return m.to.scope==='admin'||m.from.role==='admin';
  if(session.role==='manager'){
    if(m.from.role==='manager'&&m.from.branchId===session.branchId)return true; // ما أرسله المدير
    if(m.from.role==='employee'&&m.from.branchId===session.branchId)return true; // رسائل موظفي فرعه
    if(m.from.role==='admin'&&(m.to.scope==='region'||(m.to.scope==='branch'&&m.to.branchId===session.branchId)))return true;
    if(m.to.scope==='branch'&&m.to.branchId===session.branchId)return true;
    if(m.to.scope==='employee'&&m.to.branchId===session.branchId)return true;
    return false;
  }
  // موظف
  if(m.from.role==='employee'&&m.from.empId===session.empId)return true; // ما أرسله
  if(m.to.scope==='region')return true;
  if(m.to.scope==='branch'&&m.to.branchId===session.branchId)return true;
  if(m.to.scope==='employee'&&m.to.empId===session.empId)return true;
  return false;
}
function myMessages(){const del=new Set(state.deletedMsgIds);
  return state.messages.filter(m=>!del.has(m.id)&&msgVisible(m)).sort((a,b)=>b.createdAt.localeCompare(a.createdAt));}

function isMine(m){
  if(session.role==='admin')return m.from.role==='admin';
  if(session.role==='manager')return m.from.role==='manager'&&m.from.branchId===session.branchId;

let mediaRec=null,recChunks=[],recVoice=null;
async function toggleRec(){
  const btn=document.getElementById('recBtn');
  if(mediaRec&&mediaRec.state==='recording'){mediaRec.stop();return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    recChunks=[];mediaRec=new MediaRecorder(stream);
    mediaRec.ondataavailable=e=>{if(e.data.size)recChunks.push(e.data);};
    mediaRec.onstop=()=>{const blob=new Blob(recChunks,{type:'audio/webm'});stream.getTracks().forEach(t=>t.stop());
      const r=new FileReader();r.onload=()=>{recVoice=r.result;
        document.getElementById('recPrev').innerHTML=`<audio controls src="${recVoice}" style="width:100%;margin-top:8px"></audio>
          <button type="button" class="btn ghost sm" onclick="recVoice=null;document.getElementById('recPrev').innerHTML=''">🗑️ حذف التسجيل</button>`;};
      r.readAsDataURL(blob);btn.textContent='🎙️ تسجيل صوتي';btn.classList.remove('danger');};
    mediaRec.start();btn.textContent='⏹️ إيقاف التسجيل';btn.classList.add('danger');
  }catch(e){alert('تعذّر الوصول للميكروفون: '+e.message);}
}

/* ================= المزامنة السحابية (Supabase) ================= */
let sb=null,pushTimer=null,applyingRemote=false,channel=null;
function setSync(txt,ok){const t=document.getElementById('syncTxt');const d=document.getElementById('syncDot');if(t)t.textContent=txt;if(d)d.style.background=ok?'var(--good)':'var(--muted)';}
function mergeState(a,b){
  const out=JSON.parse(JSON.stringify(a));
  const useRemote=(b.configRev||0)>(a.configRev||0);
  const cfg=useRemote?b:a;
  out.region=cfg.region;out.adminPin=cfg.adminPin;out.branches=cfg.branches;
  out.configRev=Math.max(a.configRev||1,b.configRev||1);out.configUpdatedAt=cfg.configUpdatedAt;
  const du=(x,y)=>Array.from(new Set([...(x||[]),...(y||[])]));
  out.deletedEntryIds=du(a.deletedEntryIds,b.deletedEntryIds);
  out.deletedPipeIds=du(a.deletedPipeIds,b.deletedPipeIds);
  out.deletedMsgIds=du(a.deletedMsgIds,b.deletedMsgIds);
  const delE=new Set(out.deletedEntryIds),delP=new Set(out.deletedPipeIds),delM=new Set(out.deletedMsgIds);
  const em=new Map();[...(a.entries||[]),...(b.entries||[])].forEach(x=>{if(!delE.has(x.id))em.set(x.id,x);});
  out.entries=[...em.values()];
  const pm=new Map();[...(a.pipeline||[]),...(b.pipeline||[])].forEach(x=>{if(delP.has(x.id))return;const ex=pm.get(x.id);if(!ex||(x.updatedAt||'')>(ex.updatedAt||''))pm.set(x.id,x);});
  out.pipeline=[...pm.values()];
  const mm=new Map();[...(a.messages||[]),...(b.messages||[])].forEach(x=>{if(delM.has(x.id))return;const ex=mm.get(x.id);if(!ex)mm.set(x.id,x);else mm.set(x.id,{...ex,readBy:{...(ex.readBy||{}),...(x.readBy||{})}});});
  out.messages=[...mm.values()];
  return out;
}
function applyRemote(remote){
  try{
    state=mergeState(state,normalize(remote));saveLocal();
    applyingRemote=true;render();applyingRemote=false;
    setSync('متصل',true);
  }catch(e){}
}
async function pullCloud(){
  if(!sb)return;
  try{
    const {data,error}=await sb.from(CLOUD.table).select('data').eq('id',CLOUD.rowId).single();
    if(!error&&data&&data.data&&Object.keys(data.data).length){applyRemote(data.data);}
    else{schedulePush();}
  }catch(e){}
}
function schedulePush(){
  if(applyingRemote)return;
  clearTimeout(pushTimer);pushTimer=setTimeout(pushCloud,800);
}
async function pushCloud(){
  if(!sb)return;
  try{
    setSync('مزامنة…',true);

function periodLabel(){const m=period.mode;return m==='today'?'اليوم':m==='week'?'الأسبوع':m==='month'?'الشهر':m==='quarter'?'الربع':m==='year'?'السنة':m==='custom'?'الفترة المختارة':'التراكمي';}
function elapsedFraction(){const r=periodRange();if(!r)return 1;const now=new Date();if(now>=r.end)return 1;if(now<=r.start)return 0.0001;
  let total=0,done=0;const d=new Date(r.start);d.setHours(0,0,0,0);
  while(d<=r.end){if(!isWeekend(d)){total++;if(d<=now)done++;}d.setDate(d.getDate()+1);}
  return total?Math.max(done/total,0.0001):1;}
function gapsOf(actuals,targets){return PRODUCTS.map(p=>{const t=targets[p.key]||0,a=actuals[p.key]||0;const pc=t>0?Math.min(a/t*100,150):null;return {p,t,a,gap:Math.max(0,t-a),pc:pc};}).filter(x=>x.t>0);}
const NEXT_STEP={
 liabilities_cs:'استهدف تحويل رواتب جهة جديدة وافتح حسابات جارية للموظفين',

function projectedScore(actuals,targets){const f=elapsedFraction();const a={};PRODUCTS.forEach(p=>a[p.key]=(actuals[p.key]||0)/f);return weightedScore(targets,a);}
function nextStepCards(actuals,targets,limit){
  const gs=gapsOf(actuals,targets).filter(x=>x.gap>0).sort((a,b)=>(a.pc-b.pc));

function rescuePlan(actuals,targets){
  const gs=gapsOf(actuals,targets).filter(x=>x.gap>0).sort((a,b)=>a.pc-b.pc).slice(0,2);

  const days=['اليوم 1-2','اليوم 3-4','اليوم 5-6','اليوم 7'];

  gs.forEach(x=>{steps.push(`ركّز على «${x.p.label}» — متبقّي ${fmtGap(x)}: ${NEXT_STEP[x.p.key]}`);});
  steps.push('راجع قائمة عملائك الحاليين واطلب ترشيحات (Referral).');
  steps.push('سجّل النتائج يومياً على النظام وتابع الفجوة.');

    steps.map((s,i)=>`<li><b>${days[Math.min(i,3)]}:</b> ${s}</li>`).join('')+`</ol>`;
}

    var rows=ms.length? ms.map(function(m){ return '<div class="card" style="'+(!m.read?'border-inline-start:4px solid #2e7d1e;':'')+'margin-bottom:10px"><div style="white-space:pre-wrap">'+(m.text||'').replace(/</g,'&lt;')+'</div><div class="muted" style="margin-top:6px">'+new Date(m.at).toLocaleString('ar-EG')+(m.toBranch==='*'?' • للجميع':'')+'</div></div>'; }).join('') : '<div class="card muted">لا توجد رسائل.</div>';
    var changed=false; window.__zInbox(bid).forEach(function(m){if(!m.read){m.read=true;changed=true;}});
    if(changed){ if(typeof saveLocal==='function')saveLocal(); if(typeof schedulePush==='function')schedulePush(); }
    return '<div class="card z-frame"><h3 style="margin:0">📨 رسائل الإدارة</h3></div>'+rows;
  };

  if(!window.__zDeleg){ window.__zDeleg=true; document.addEventListener('click',function(e){ var b=e.target.closest?e.target.closest('[data-zgo]'):null; if(b){ go(b.getAttribute('data-zgo')); } }); }

  var _nav=window.renderNav;
  window.renderNav=function(){
    _nav.apply(this,arguments);
    try{ var nav=document.getElementById('nav'); if(!nav||!session) return;
      if(session.role==='manager'){ var u=window.__zUnread(session.branchId);
        nav.insertAdjacentHTML('beforeend','<button data-zgo="zt" class="'+(route.page==='zt'?'active':'')+'">🧮 أرقام الفرع</button><button data-zgo="zc" class="'+(route.page==='zc'?'active':'')+'">📊 ترتيب فرعي</button><button data-zgo="zinbox" class="'+(route.page==='zinbox'?'active':'')+'">📨 الرسائل'+(u?' ('+u+')':'')+'</button>');
      } else if(session.role==='admin'){ nav.insertAdjacentHTML('beforeend','<button data-zgo="zsend" class="'+(route.page==='zsend'?'active':'')+'">📨 مراسلة المدراء</button>'); }
    }catch(e){}
  };
  var _render=window.render;
  window.render=function(){
    _render.apply(this,arguments); if(!session) return;
    var p=route&&route.page; var v=document.getElementById('view'); if(!v) return;
    if(p==='zt'&&session.role==='manager') v.innerHTML=branchTotalsHTML();
    else if(p==='zc'&&session.role==='manager') v.innerHTML=compareHTML();
    else if(p==='zinbox'&&session.role==='manager') v.innerHTML=inboxHTML();
    else if(p==='zsend'&&session.role==='admin') v.innerHTML=sendMsgHTML();
  };
  if(typeof render==='function'&&session) render();
  return 'ok';
})();
</script>
<script>(function(){
  // A) more green
  if(!document.getElementById('z10enh2-css')){
    var st=document.createElement('style'); st.id='z10enh2-css';
    st.textContent=[
      'body{background:linear-gradient(180deg,#eef9f1 0%,#e2f4e9 100%)!important}',
      'h1,h2,h3,h4{color:#16713e!important}',
      '.card h3{color:#16713e!important}',
      'table th,.mini th,.z-th{background:#16713e!important;color:#fff!important}',
      '.pill,.badge,.chip{background:#e7f7ec!important;color:#13693a!important;border-color:#b6e6c6!important}',
      'button.primary,.btn-primary,.z-btn,.primary{background:#16713e!important;border-color:#16713e!important;color:#fff!important}',
      '.field input,.z-input,select,textarea{border-color:#bfe3cb!important}'
    ].join('\n');
    document.head.appendChild(st);
  }
  // B) backdating branch totals
  if(window.branchTotalsHTML && !window.__btWrapped){
    window.__btWrapped=true;
    var _bt=window.branchTotalsHTML;
    window.branchTotalsHTML=function(){
      var h=_bt.apply(this,arguments);
      var bid=(typeof session!=='undefined'&&session)?session.branchId:null;
      var bt=(typeof state!=='undefined'&&state.branchTotals&&bid)?state.branchTotals[bid]:null;
      var hist='';
      if(bt&&bt.history){
        var ks=Object.keys(bt.history).sort().reverse();
        if(ks.length){ hist='<div class="card"><h3>📅 سجل أرقام الفرع بالتواريخ</h3><table class="mini"><tr><th>التاريخ</th><th>كيوماتيك</th><th>تللير</th><th>خدمة عملاء</th></tr>'+ks.map(function(d){var r=bt.history[d];return '<tr><td>'+d+'</td><td>'+(r.qmatic||0)+'</td><td>'+(r.tellers||0)+'</td><td>'+(r.cs||0)+'</td></tr>';}).join('')+'</table></div>'; }
      }
      var dv=(typeof todayStr==='function')?todayStr():new Date().toISOString().slice(0,10);
      var dateField='<div class="card"><h3>🗓️ تاريخ الإدخال</h3><div class="field"><label>اختر التاريخ (يمكن اختيار تاريخ سابق)</label><input type="date" id="zt_date" value="'+dv+'"></div></div>';
      return dateField+h+hist;
    };
  }
  // override save to store by date
  if(window.saveBranchTotals && !window.__sbtWrapped){
    window.__sbtWrapped=true;
    window.saveBranchTotals=function(){
      var bid=session.branchId; state.branchTotals=state.branchTotals||{};
      var vals={};
      PRODUCTS.forEach(function(p){ var el=document.getElementById('zt_'+p.key); var n=el?parseFloat(el.value):NaN; vals[p.key]=isNaN(n)?0:n; });
      function num(id){var e=document.getElementById(id);return e?(parseFloat(e.value)||0):0;}
      var tellers=num('zt_tellers'), cs=num('zt_cs'), qmatic=tellers+cs;
      var de=document.getElementById('zt_date'); var date=(de&&de.value)?de.value:((typeof todayStr==='function')?todayStr():new Date().toISOString().slice(0,10));
      var prev=state.branchTotals[bid]||{};
      var history=prev.history||{};
      history[date]={values:vals,tellers:tellers,cs:cs,qmatic:qmatic};
      state.branchTotals[bid]={values:vals,tellers:tellers,cs:cs,qmatic:qmatic,date:date,history:history,updatedAt:new Date().toISOString(),by:(typeof deviceId==='function'?deviceId():'')};
      commit(false);
      alert('تم حفظ أرقام الفرع لتاريخ '+date+' ✅');
      if(typeof render==='function') render();
    };
  }
  // C) ranking first for manager & admin on region page
  if(window.render && !window.__rankFirstWrapped){
    window.__rankFirstWrapped=true;
    var _r=window.render;
    window.render=function(){
      var ret=_r.apply(this,arguments);
      try{
        var role=(typeof session!=='undefined'&&session)?session.role:null;
        if((role==='manager'||role==='admin') && typeof route!=='undefined' && route && route.page==='region'){
          var view=document.getElementById('view');
          if(view && !document.getElementById('z-rankfirst')){
            var rk=window.__zrank?window.__zrank():[];
            var rows=rk.map(function(x){return '<tr'+((role==='manager'&&session.branchId===x.br.id)?' style="background:#d6f5e0;font-weight:700"':'')+'><td>'+x.rank+'</td><td>'+x.br.name+'</td><td>'+Math.round(x.score)+'%</td></tr>';}).join('');
            var box=document.createElement('div');
            box.id='z-rankfirst'; box.className='card';
            box.style.cssText='border:2px solid #16713e;background:#eaf8ef';
            box.innerHTML='<h3>🏆 ترتيب الفروع في المنطقة</h3><table class="mini"><tr><th>الترتيب</th><th>الفرع</th><th>نسبة الإنجاز</th></tr>'+rows+'</table>';
            view.insertBefore(box, view.firstChild);
          }
        }
      }catch(e){}
      return ret;
    };
  }
})();</script>
<script>(function(){
  window.__zclass=function(p){ p=Math.round(p||0); if(p<=50) return {l:'يحتاج إلى تطوير',bg:'#fdecec',fg:'#b3261e'}; if(p<=80) return {l:'يلبي التوقعات',bg:'#fff6e5',fg:'#9a6700'}; return {l:'يفوق التوقعات',bg:'#e7f7ec',fg:'#13693a'}; };
  if(window.render && !window.__enh3Wrapped){
    window.__enh3Wrapped=true;
    var _r=window.render;
    window.render=function(){
      var ret=_r.apply(this,arguments);
      try{
        if(!window.__logoSrc){ var im=document.querySelector('img[src^="data:image"]'); if(im) window.__logoSrc=im.src; }
        document.querySelectorAll('[onclick]').forEach(function(el){
          var oc=el.getAttribute('onclick')||'';
          if(/start(Employee|Manager|Admin)Login/.test(oc) && !el.__pro){
            el.__pro=true;
            var ic=el.querySelector('.z-ic');
            if(ic && window.__logoSrc){
              ic.style.cssText='width:76px;height:76px;margin:0 auto 12px;border-radius:50%;background:#fff;border:3px solid #16713e;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 4px 14px rgba(22,113,62,.28)';
              ic.innerHTML='<img src="'+window.__logoSrc+'" style="width:86%;height:86%;object-fit:contain">';
            }
            el.style.cssText=(el.style.cssText||'')+';text-align:center;border:1px solid #b6e6c6;background:linear-gradient(180deg,#ffffff,#eaf8ef);border-radius:16px;padding:24px 16px';
          }
        });
        var box=document.getElementById('z-rankfirst');
        if(box && !box.__cls){
          box.__cls=true;
          var trs=box.querySelectorAll('table tr');
          for(var i=0;i<trs.length;i++){
            if(i===0){ var th=document.createElement('th'); th.textContent='التصنيف'; trs[i].appendChild(th); }
            else{
              var tds=trs[i].querySelectorAll('td');
              var pctTxt=tds.length?tds[tds.length-1].textContent:'0';
              var p=parseFloat(pctTxt)||0; var c=window.__zclass(p);
              var td=document.createElement('td'); td.textContent=c.l; td.style.cssText='background:'+c.bg+';color:'+c.fg+';font-weight:700;border-radius:6px';
              trs[i].appendChild(td);
            }
          }
          var lg=document.createElement('div'); lg.style.cssText='margin-top:8px;font-size:12px;color:#555;line-height:1.8';
          lg.innerHTML='<span style="color:#b3261e">●</span> 0–50% يحتاج إلى تطوير &nbsp; <span style="color:#9a6700">●</span> 51–80% يلبي التوقعات &nbsp; <span style="color:#13693a">●</span> 81–100% يفوق التوقعات';
          box.appendChild(lg);
        }
      }catch(e){}
      return ret;
    };
  }
})();</script>
<script>(function(){
  if(window.branchTotalsHTML && !window.__bt4Wrapped){
    window.__bt4Wrapped=true;
    var _bt=window.branchTotalsHTML;
    window.branchTotalsHTML=function(){
      var h=_bt.apply(this,arguments);
      var bid=(typeof session!=='undefined'&&session)?session.branchId:null;
      var bt=(typeof state!=='undefined'&&state.branchTotals&&bid)?state.branchTotals[bid]:null;
      var cd=(bt&&bt.corpDep!=null)?bt.corpDep:'';
      var cv=(bt&&bt.corpSav!=null)?bt.corpSav:'';
      var extra='<div style="margin-top:4px"><h4 style="margin:8px 0;color:#16713e">🏢 إيداع وودائع الشركات</h4>'
        +'<div class="field"><label>إيداع الشركات</label><input class="z-input" id="zt_corp_dep" type="number" inputmode="numeric" value="'+cd+'"></div>'
        +'<div class="field"><label>ودائع شركات</label><input class="z-input" id="zt_corp_sav" type="number" inputmode="numeric" value="'+cv+'"></div>'
        +'</div>';
      var mk='<div class="z-row" style="margin-top:6px">';var bi=h.indexOf(mk);return bi>-1?(h.slice(0,bi)+extra+h.slice(bi)):(h+extra);
    };
  }
  if(window.saveBranchTotals && !window.__sbt4Wrapped){
    window.__sbt4Wrapped=true;
    var _save=window.saveBranchTotals;
    window.saveBranchTotals=function(){
      function num(id){var e=document.getElementById(id);return e?(parseFloat(e.value)||0):0;}
      var cd=num('zt_corp_dep'), cv=num('zt_corp_sav');
      var de=document.getElementById('zt_date');
      var date=(de&&de.value)?de.value:((typeof todayStr==='function')?todayStr():new Date().toISOString().slice(0,10));
      _save.apply(this,arguments);
      try{
        var bid=session.branchId;
        if(state.branchTotals&&state.branchTotals[bid]){
          state.branchTotals[bid].corpDep=cd;
          state.branchTotals[bid].corpSav=cv;
          if(state.branchTotals[bid].history&&state.branchTotals[bid].history[date]){
            state.branchTotals[bid].history[date].corpDep=cd;
            state.branchTotals[bid].history[date].corpSav=cv;
          }
          commit(false);
        }
      }catch(e){}
    };
  }
})();</script>
